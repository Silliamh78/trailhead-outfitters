<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Order - Trailhead Outfitters</title>
    <link rel="stylesheet" href="src/style.css">
    <script type="module" src="./src/order.js"></script>
</head>
<body>
    <header>
        <nav>
            <a id="browse-products" href="index.html">Browse Products</a>
        </nav>
    </header>

    <main>
        <section id="product-info"></section>

        <section id="order-section">
            <h2>Complete Your Order</h2>
            <form id="order-form" novalidate>
                <div class="form-field">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required autocomplete="name">
                    <span class="error-msg" id="name-error" role="alert"></span>
                </div>

                <div class="form-field">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required autocomplete="email">
                    <span class="error-msg" id="email-error" role="alert"></span>
                </div>

                <div class="form-field">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone" autocomplete="tel">
                </div>

                <div class="form-field">
                    <label for="address">Shipping Address *</label>
                    <textarea id="address" name="address" rows="3" required></textarea>
                    <span class="error-msg" id="address-error" role="alert"></span>
                </div>

                <div class="form-field">
                    <label for="message">Additional Notes (Optional)</label>
                    <textarea id="message" name="message" rows="3"></textarea>
                </div>

                <button type="submit" class="btn-primary">Place Order</button>
            </form>
        </section>

        <section id="confirmation" class="is-hidden">
            <h2>✅ Order Confirmed!</h2>
            <p id="confirmation-text"></p>
            <p id="order-count-display"></p>
            <a href="index.html">← Back to Products</a>
        </section>
    </main>
</body>
</html>
